version: 0.2

phases:
  build:
    commands:

      - echo "Using deployment buildspec with instance i-030eb041e9e02a12b"

      - echo "Checking buildspec for old instance ID..."
      - |
        if grep -R "i-0f054f9724d85b717" .; then
          echo "ERROR: Old instance ID found in source"
          exit 1
        else
          echo "No old instance ID found"
        fi

      - echo "Starting deployment through SSM..."

      - |
        COMMAND_ID=$(aws ssm send-command \
          --document-name "AWS-RunShellScript" \
          --targets "Key=InstanceIds,Values=i-030eb041e9e02a12b" \
          --parameters '{"commands":[
            "echo Deployment started",
            "mkdir -p /tmp/deployment",
            "aws s3 cp s3://cloud-native-deployment-artifacts-2026/cloud-native-webapp /tmp/cloud-native-webapp.zip",
            "rm -rf /tmp/deployment/*",
            "unzip -o /tmp/cloud-native-webapp.zip -d /tmp/deployment",
            "sudo cp -r /tmp/deployment/app/* /var/www/html/",
            "sudo systemctl restart nginx",
            "echo Deployment completed"
          ]}' \
          --query "Command.CommandId" \
          --output text)

        echo "SSM Command ID: $COMMAND_ID"

      - |
        echo "Waiting for SSM command execution..."

        for i in {1..30}
        do
          STATUS=$(aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id i-030eb041e9e02a12b \
            --query "Status" \
            --output text 2>/dev/null || true)

          echo "Current SSM status: $STATUS"

          if [ "$STATUS" != "None" ] && [ -n "$STATUS" ]; then
            break
          fi

          sleep 10
        done

      - |
        aws ssm wait command-executed \
          --command-id $COMMAND_ID \
          --instance-id i-030eb041e9e02a12b

      - |
        echo "Fetching deployment result..."

        aws ssm get-command-invocation \
          --command-id $COMMAND_ID \
          --instance-id i-030eb041e9e02a12b \
          --query "{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}"

        STATUS=$(aws ssm get-command-invocation \
          --command-id $COMMAND_ID \
          --instance-id i-030eb041e9e02a12b \
          --query "Status" \
          --output text)

        if [ "$STATUS" != "Success" ]; then
          echo "Deployment failed"
          exit 1
        fi

        echo "Deployment successful"
