version: 0.2

phases:

  install:
    commands:
      - echo "Checking environment utilities..."
      - date

  pre_build:
    commands:
      - echo "Setting execution permissions..."
      - chmod +x scripts/*.sh

  build:
    commands:
      - echo "Build phase started..."
      - echo "Validating application files..."
      - ls -la app/
      - ls -la scripts/

  post_build:
    commands:
      - echo "Build completed successfully."

artifacts:
  files:
    - 'app/**/*'
    - 'scripts/**/*'
  name: cloud-native-build-artifact
